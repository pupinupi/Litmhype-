<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Литвин: Путь к хайпу</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<h1>Литвин: Путь к хайпу</h1>

<input id="name" placeholder="Имя игрока"><br>
<input id="room" placeholder="Код комнаты"><br>

<select id="color">
<option value="yellow">Жёлтая</option>
<option value="red">Красная</option>
<option value="blue">Синяя</option>
<option value="purple">Фиолетовая</option>
</select><br>

<button onclick="join()">Войти</button>

<script>
function join(){
    const name=document.getElementById("name").value
    const room=document.getElementById("room").value
    const color=document.getElementById("color").value
    if(!name||!room){alert("Введите имя и код комнаты");return;}
    localStorage.setItem("name",name)
    localStorage.setItem("room",room)
    localStorage.setItem("color",color)
    window.location="room.html"
}
</script>
</body>
</html>
