<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>LitmHype Lobby</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="lobby">
    <h1>LitmHype</h1>
    <input id="name" placeholder="Имя игрока" maxlength="12">
    <input id="room" placeholder="Код комнаты" maxlength="6">
    <div class="colorSelect">
        <div class="colorCircle" data-color="yellow" style="background:yellow"></div>
        <div class="colorCircle" data-color="red" style="background:red"></div>
        <div class="colorCircle" data-color="blue" style="background:blue"></div>
        <div class="colorCircle" data-color="purple" style="background:purple"></div>
    </div>
    <button id="joinBtn">Войти</button>
</div>

<script>
let chosenColor = "yellow";
document.querySelectorAll(".colorCircle").forEach(c=>{
    c.addEventListener("click", ()=> { 
        chosenColor=c.getAttribute("data-color");
        document.querySelectorAll(".colorCircle").forEach(cc=>cc.style.border="none");
        c.style.border="3px solid white";
    });
});

document.getElementById("joinBtn").onclick=()=>{
    const name=document.getElementById("name").value.trim();
    const room=document.getElementById("room").value.trim();
    if(name && room){
        localStorage.setItem("name",name);
        localStorage.setItem("room",room);
        localStorage.setItem("color",chosenColor);
        window.location="room.html";
    }
};
</script>
</body>
</html>
