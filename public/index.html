<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Lobby</title>
</head>

<body>

<h2>Лобби</h2>

<input id="name" placeholder="Имя">
<input id="room" placeholder="Комната">

<select id="color">
<option value="red">Красный</option>
<option value="yellow">Жёлтый</option>
<option value="blue">Синий</option>
<option value="purple">Фиолетовый</option>
</select>

<button id="join">Войти</button>

<ul id="players"></ul>

<button id="start">Начать игру</button>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io();
let roomCode;

document.getElementById("join").onclick = () => {

  const username = document.getElementById("name").value;
  roomCode = document.getElementById("room").value;
  const color = document.getElementById("color").value;

  localStorage.setItem("room", roomCode);

  socket.emit("joinRoom", { username, roomCode, color });

};

socket.on("playersUpdate", (players) => {

  const list = document.getElementById("players");
  list.innerHTML = "";

  players.forEach(p => {
    const li = document.createElement("li");
    li.innerText = p.username + " (" + p.color + ")";
    list.appendChild(li);
  });

});

document.getElementById("start").onclick = () => {
  socket.emit("startGame", roomCode);
};

socket.on("startGame", () => {
  window.location.href = "game.html";
});

</script>

</body>
</html>
