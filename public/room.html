<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Разметка клеток</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
text-align:center;
}

#board{
position:relative;
width:1024px;
height:1024px;
margin:auto;
background:url("board.jpg");
background-size:cover;
border:3px solid white;
}

.dot{
width:14px;
height:14px;
background:red;
border-radius:50%;
position:absolute;
transform:translate(-50%,-50%);
}

button{
margin-top:15px;
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

#coords{
width:90%;
height:200px;
margin-top:15px;
}

</style>

</head>

<body>

<h2>Разметка координат клеток</h2>

<p>Кликай по центру каждой клетки по порядку</p>

<div id="board"></div>

<br>

<button onclick="copyCoords()">Скопировать координаты</button>
<button onclick="resetCoords()">Сбросить</button>

<br>

<textarea id="coords"></textarea>

<script src="game.js"></script>

</body>
</html>
