<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Litvin Hype - Лобби</title>
<style>
body{
    margin:0;
    padding:0;
    font-family: Arial, sans-serif;
    background: url('lobby-bg.jpg') no-repeat center center fixed;
    background-size: cover;
    color: white;
    text-align:center;
}
h1{
    margin-top:40px;
    font-size:48px;
    text-shadow: 2px 2px 8px #000;
}
input{
    font-size:22px;
    padding:12px;
    margin:12px;
    width:300px;
    border-radius:10px;
    border:2px solid #fff;
    background: rgba(255,255,255,0.1);
    color:white;
}
input::placeholder{
    color: #ddd;
}
button{
    font-size:24px;
    padding:12px 40px;
    margin-top:20px;
    border:none;
    border-radius:10px;
    background: linear-gradient(45deg,#ffcc00,#ff6600);
    cursor:pointer;
    color:white;
    font-weight:bold;
    box-shadow: 0 0 10px #000;
}
button:hover{
    box-shadow: 0 0 20px #fff;
}
</style>
</head>
<body>

<h1>Litvin — Путь к хайпу</h1>

<input type="text" id="name" placeholder="Ваше имя"><br>
<input type="text" id="room" placeholder="Код комнаты"><br>
<select id="color" style="font-size:22px;padding:10px;margin:12px;">
    <option value="yellow">Жёлтая</option>
    <option value="red">Красная</option>
    <option value="blue">Синяя</option>
    <option value="purple">Фиолетовая</option>
</select><br>
<button id="enter">Вход в комнату</button>

<script>
document.getElementById("enter").onclick = () => {
    const name = document.getElementById("name").value.trim()
    const room = document.getElementById("room").value.trim()
    const color = document.getElementById("color").value

    if(!name || !room){
        alert("Введите имя и код комнаты!")
        return
    }

    localStorage.setItem("name", name)
    localStorage.setItem("room", room)
    localStorage.setItem("color", color)

    window.location.href = "room.html"
}
</script>

</body>
</html>
